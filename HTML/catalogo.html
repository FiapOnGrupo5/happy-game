<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Produtos - Happy Games</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <link
      rel="stylesheet"
      href="../CSS/desktop.css"
      media="(min-width:1024px)"
    />
    <link rel="stylesheet" href="../CSS/carrinho.css" />
    <link rel="stylesheet" href="../CSS/catalogo.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a
          class="navbar-brand text-white navbar-brand-custom"
          href="index.html"
        >
          <i class="bi bi-controller me-2"></i>Happy Games
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMenu">
          <ul class="navbar-nav gap-1">
            <li class="nav-item">
              <a class="nav-link" href="index.html"
                ><i class="bi bi-house me-1"></i>Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="catalogo.html"
                ><i class="bi bi-grid me-1"></i>Catálogo</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="carrinho.html" id="cartLink">
                <i class="bi bi-cart3 me-1"></i>Carrinho
                <span class="badge cart-badge" id="cartBadge" style="display:none;">0</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="sobre.html"
                ><i class="bi bi-info-circle me-1"></i>Sobre</a
              >
            </li>
            <ul id="navbarAuth" class="navbar-nav gap-1"></ul>
          </ul>
        </div>
      </div>
    </nav>
    <main>
      <div class="container py-4">
        <div
          class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4"
        >
          <h2 class="section-title mb-0">
            <i class="bi bi-grid-fill me-2"></i>Todos os jogos
          </h2>
          <div class="d-flex gap-2 flex-wrap">
            <div class="input-group search-bar" style="max-width: 340px">
              <input
                type="text"
                class="form-control"
                placeholder="Buscar jogo..."
                id="searchInput"
                oninput="filtrarJogos()"
              />
              <button class="btn-search" type="button">
                <i class="bi bi-search"></i>
              </button>
            </div>
            <button
              class="btn-filtro"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#offcanvasFiltro"
            >
              <i class="bi bi-sliders me-1"></i>Filtros
            </button>
          </div>
        </div>
        <div
          class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
          id="jogosGrid"
        >
          <!-- Cards gerados dinamicamente pelo catalogo.js a partir de dados.js -->
        </div>

        <div id="noResults" style="display:none;">
          <i class="bi bi-search" style="font-size: 3rem; color: #ccc"></i>
          <p class="mt-3 fs-5">Nenhum jogo encontrado com esses filtros.</p>
        </div>
      </div>
    </main>

    <div
      class="offcanvas offcanvas-end"
      tabindex="-1"
      id="offcanvasFiltro"
      aria-labelledby="offcanvasFiltroLabel"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasFiltroLabel">
          <i class="bi bi-sliders me-2"></i>Filtrar jogos
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Fechar"
        ></button>
      </div>
      <div class="offcanvas-body">
        <p class="filter-label">Gênero</p>
        <div class="mb-3">
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="ação"
              id="fAcao"
              data-filter-type="genero"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fAcao">Ação</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="sobrevivência"
              id="fSobrev"
              data-filter-type="genero"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fSobrev"
              >Sobrevivência</label
            >
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="mundo aberto"
              id="fMundo"
              data-filter-type="genero"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fMundo">Mundo Aberto</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="battle royale"
              id="fBR"
              data-filter-type="genero"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fBR">Battle Royale</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="esporte"
              id="fEsporte"
              data-filter-type="genero"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fEsporte">Esporte</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="sandbox"
              id="fSandbox"
              data-filter-type="genero"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fSandbox">Sandbox</label>
          </div>
        </div>
        <hr />
        <p class="filter-label">Plataforma</p>
        <div class="mb-3">
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="ps5"
              id="fPS5"
              data-filter-type="plataforma"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fPS5">PlayStation 5</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="xbox"
              id="fXbox"
              data-filter-type="plataforma"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fXbox">Xbox</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value="pc"
              id="fPC"
              data-filter-type="plataforma"
              onchange="filtrarJogos()"
            /><label class="form-check-label" for="fPC">PC</label>
          </div>
        </div>
        <hr />
        <button
          class="btn btn-outline-secondary w-100"
          onclick="limparFiltros()"
        >
          <i class="bi bi-x-circle me-1"></i>Limpar filtros
        </button>
      </div>
    </div>

    <div class="toast-container-custom">
      <div
        id="gameToast"
        class="toast align-items-center text-bg-success border-0"
        role="alert"
      >
        <div class="d-flex">
          <div class="toast-body fw-semibold">
            <i class="bi bi-check-circle me-2"></i
            ><span id="toastMsg">Jogo adicionado!</span>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <footer>
      <h2 style="font-size: 1.2rem; margin-bottom: 0.5rem">Contato</h2>
      <p>Email: contato@happygames.com</p>
      <p>&copy; 2026 Happy Games</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JavaScript/dados.js"></script>
    <script src="../JavaScript/auth.js"></script>
    <script src="../JavaScript/carrinho.js"></script>
    <script src="../JavaScript/catalogo.js"></script>
  </body>
</html>
