<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" font-family="Segoe UI, Tahoma, sans-serif">

  <!-- Background -->
  <rect width="900" height="540" fill="#f5f6fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="#764ba2">Sitemap – Happy Games</text>

  <!-- ===== ROOT NODE: Home ===== -->
  <rect x="350" y="65" width="200" height="52" rx="10" fill="#667eea" stroke="#764ba2" stroke-width="2"/>
  <text x="450" y="87" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">HOME</text>
  <text x="450" y="104" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">index.html</text>

  <!-- ===== CONNECTOR: Home → children ===== -->
  <!-- Vertical line down from Home -->
  <line x1="450" y1="117" x2="450" y2="170" stroke="#764ba2" stroke-width="2"/>
  <!-- Horizontal line across all children -->
  <line x1="100" y1="170" x2="800" y2="170" stroke="#764ba2" stroke-width="2"/>
  <!-- Vertical lines down to each child -->
  <line x1="100" y1="170" x2="100" y2="210" stroke="#764ba2" stroke-width="2"/>
  <line x1="310" y1="170" x2="310" y2="210" stroke="#764ba2" stroke-width="2"/>
  <line x1="590" y1="170" x2="590" y2="210" stroke="#764ba2" stroke-width="2"/>
  <line x1="800" y1="170" x2="800" y2="210" stroke="#764ba2" stroke-width="2"/>

  <!-- ===== CHILD: Catálogo ===== -->
  <rect x="210" y="210" width="200" height="52" rx="10" fill="#fff" stroke="#667eea" stroke-width="2"/>
  <text x="310" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#764ba2">CATÁLOGO</text>
  <text x="310" y="249" text-anchor="middle" font-size="11" fill="#3c4a4f">catalogo.html</text>

  <!-- Sub-features of Catálogo -->
  <line x1="310" y1="262" x2="310" y2="300" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="210" y="300" width="200" height="36" rx="8" fill="#f0eef8" stroke="#ccc" stroke-width="1"/>
  <text x="310" y="316" text-anchor="middle" font-size="11" fill="#555">Busca em tempo real</text>
  <text x="310" y="330" text-anchor="middle" font-size="11" fill="#555">Filtro por gênero/plataforma</text>

  <!-- ===== CHILD: Compra ===== -->
  <rect x="490" y="210" width="200" height="52" rx="10" fill="#fff" stroke="#667eea" stroke-width="2"/>
  <text x="590" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#764ba2">COMPRA</text>
  <text x="590" y="249" text-anchor="middle" font-size="11" fill="#3c4a4f">compra.html</text>

  <!-- Sub-features of Compra -->
  <line x1="590" y1="262" x2="590" y2="300" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="490" y="300" width="200" height="36" rx="8" fill="#f0eef8" stroke="#ccc" stroke-width="1"/>
  <text x="590" y="316" text-anchor="middle" font-size="11" fill="#555">Stepper 3 etapas</text>
  <text x="590" y="330" text-anchor="middle" font-size="11" fill="#555">Modal de revisão do pedido</text>

  <!-- ===== CHILD: Sobre ===== -->
  <rect x="0" y="210" width="200" height="52" rx="10" fill="#fff" stroke="#667eea" stroke-width="2"/>
  <text x="100" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#764ba2">SOBRE</text>
  <text x="100" y="249" text-anchor="middle" font-size="11" fill="#3c4a4f">sobre.html</text>

  <!-- Sub-features of Sobre -->
  <line x1="100" y1="262" x2="100" y2="300" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="0" y="300" width="200" height="36" rx="8" fill="#f0eef8" stroke="#ccc" stroke-width="1"/>
  <text x="100" y="316" text-anchor="middle" font-size="11" fill="#555">Missão e valores</text>
  <text x="100" y="330" text-anchor="middle" font-size="11" fill="#555">Form. de comunidade</text>

  <!-- ===== CHILD: Obrigado (terminal, from Compra) ===== -->
  <rect x="700" y="210" width="200" height="52" rx="10" fill="#fff" stroke="#667eea" stroke-width="2"/>
  <text x="800" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#764ba2">OBRIGADO</text>
  <text x="800" y="249" text-anchor="middle" font-size="11" fill="#3c4a4f">obrigado.html</text>

  <!-- Sub-features of Obrigado -->
  <line x1="800" y1="262" x2="800" y2="300" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="700" y="300" width="200" height="36" rx="8" fill="#f0eef8" stroke="#ccc" stroke-width="1"/>
  <text x="800" y="316" text-anchor="middle" font-size="11" fill="#555">Confirmação do pedido</text>
  <text x="800" y="330" text-anchor="middle" font-size="11" fill="#555">Links para Home/Catálogo</text>

  <!-- ===== FLOW: Compra → Obrigado (sequential flow arrow) ===== -->
  <line x1="590" y1="370" x2="590" y2="395" stroke="#27ae60" stroke-width="2"/>
  <line x1="590" y1="395" x2="800" y2="395" stroke="#27ae60" stroke-width="2"/>
  <line x1="800" y1="395" x2="800" y2="350" stroke="#27ae60" stroke-width="2"/>
  <polygon points="800,350 795,362 805,362" fill="#27ae60"/>
  <text x="695" y="412" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">→ após confirmar pedido</text>

  <!-- ===== FLOW: Catálogo → Compra (link arrow) ===== -->
  <line x1="410" y1="236" x2="490" y2="236" stroke="#ff9f43" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="490,236 479,231 479,241" fill="#ff9f43"/>
  <text x="450" y="228" text-anchor="middle" font-size="9" fill="#ff9f43" font-weight="600">Comprar</text>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="460" width="860" height="62" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="480" font-size="12" font-weight="700" fill="#764ba2">Legenda:</text>
  <!-- Item 1 -->
  <rect x="120" y="468" width="16" height="16" rx="4" fill="#667eea"/>
  <text x="142" y="480" font-size="11" fill="#333">Página principal</text>
  <!-- Item 2 -->
  <rect x="270" y="468" width="16" height="16" rx="4" fill="#f0eef8" stroke="#ccc"/>
  <text x="292" y="480" font-size="11" fill="#333">Sub-funcionalidade</text>
  <!-- Item 3 -->
  <line x1="450" y1="476" x2="475" y2="476" stroke="#764ba2" stroke-width="2"/>
  <text x="480" y="480" font-size="11" fill="#333">Navegação estrutural</text>
  <!-- Item 4 -->
  <line x1="630" y1="476" x2="655" y2="476" stroke="#27ae60" stroke-width="2"/>
  <text x="660" y="480" font-size="11" fill="#333">Fluxo de conversão</text>
  <!-- Item 5 -->
  <line x1="120" y1="500" x2="145" y2="500" stroke="#ff9f43" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="150" y="504" font-size="11" fill="#333">Link de ação (CTA)</text>
  <!-- Item 6 -->
  <line x1="310" y1="500" x2="335" y2="500" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="340" y="504" font-size="11" fill="#333">Detalhes internos da página</text>

</svg>
